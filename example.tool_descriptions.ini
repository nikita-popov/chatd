# Tool description overrides for chatd.
#
# These descriptions replace the ones provided by MCP servers to improve
# the model's tool-selection accuracy: the model learns not just *what*
# a tool does, but *when* to call it.
#
# Format: standard INI, sections group tools by MCP server (informational only).
# Multiline values: indent continuation lines with at least one space.
#
# Search order (later files override earlier ones):
#   1. This file (shipped with the repo, safe to commit)
#   2. /etc/chatd/tool_descriptions.ini  (system-local overrides, not in git)
#   3. ~/.config/chatd/tool_descriptions.ini  (user-local overrides, not in git)
#   4. Path in CHATD_TOOL_DESCRIPTIONS env var  (runtime override)

[alerts]
alerts_list =
    List Alertmanager alerts.
    Call ONLY when the user asks about server alerts, incidents, or firing rules.

alerts_summary =
    Summarize active Alertmanager alerts by name/severity/state.
    Call ONLY when asked for a monitoring overview or alert statistics.

[monitoring]
monitor_query =
    Query VictoriaMetrics with PromQL.
    Call ONLY when the user asks for specific metrics (CPU, RAM, uptime, etc.).

[notes]
notes_search =
    Search Memos notes by text query.
    Call ONLY when the user asks to find or list their notes.
