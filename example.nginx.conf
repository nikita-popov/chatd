# chatd + ollama-gui nginx example
#
# Gotchas for streaming (NDJSON/chunked):
#   - gzip MUST be off for /api/ — nginx buffers the response for compression
#     and the browser never receives the first byte.
#   - proxy_buffering off is not enough on its own to prevent gzip buffering.
#   - proxy_set_header Connection "" is required for HTTP/1.1 keepalive
#     upstream; without it nginx sends Connection: close and breaks streaming.

server {
    server_name chat.polyserv.xyz;
    listen 80;

    access_log /var/log/nginx/polyserv.chat.access.log;
    error_log  /var/log/nginx/polyserv.chat.error.log;

    root  /var/www/chat;
    index index.html;

    # ollama-gui static frontend
    location / {
        proxy_pass http://127.0.0.1:8080/;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # chatd streaming API
    # WARNING: gzip off is mandatory — see note at the top of this file.
    location /api/ {
        proxy_pass http://127.0.0.1:5001/;

        proxy_http_version 1.1;
        proxy_set_header Connection         "";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
        proxy_connect_timeout   10s;

        gzip off;
    }

    # Direct Ollama passthrough (used by ollama-gui for model listing etc.)
    location /api/ollama/ {
        proxy_pass http://127.0.0.1:11434/;

        proxy_http_version 1.1;
        proxy_set_header Connection         "";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_buffering off;
        proxy_cache     off;

        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 10s;

        gzip off;
    }
}
